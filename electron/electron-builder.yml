appId: com.factus10.hinged
productName: Hinged
copyright: Copyright © 2026 David Anderson
directories:
  output: release
  buildResources: resources
files:
  - out/**/*
  - package.json
  - '!**/*.ts'
  - '!**/*.map'
asarUnpack:
  - '**/node_modules/better-sqlite3/**'
fileAssociations:
  - ext: hinged
    name: Hinged Backup
    description: Hinged Backup File
    role: Editor
    mimeType: application/json
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch: [x64, arm64]
  hardenedRuntime: true
  gatekeeperAssess: false
win:
  target:
    - target: nsis
      arch: [x64]
linux:
  category: Office
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
