appId: com.factus10.hinged
productName: Hinged
copyright: Copyright © 2026 David Anderson
# Disable electron-builder's built-in publisher; the GitHub Release is
# created by softprops/action-gh-release in .github/workflows/electron-build.yml.
publish: null
directories:
  output: release
  buildResources: resources
files:
  - out/**/*
  - package.json
  - '!**/*.ts'
  - '!**/*.map'
asarUnpack:
  - '**/node_modules/better-sqlite3/**'
fileAssociations:
  - ext: hinged
    name: Hinged Backup
    description: Hinged Backup File
    role: Editor
    mimeType: application/json
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch: universal
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.inherit.plist
  notarize: true
win:
  target:
    - target: nsis
      arch: [x64]
linux:
  category: Office
  # Required by the .deb format.
  maintainer: factus10@gmail.com
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
